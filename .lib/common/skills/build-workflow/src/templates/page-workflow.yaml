define:
  steps:
    - page-analyze-A:
        desc: "Controller와 퍼블 HTML/CSS를 분석하여 UI/UX 관점의 화면 명세를 생성한다"
        details:
          - thymeleaf-guide-index.md
          - hybrids-guide-index.md
        agent: uiux-analyst
    - page-analyze-B:
        desc: "Controller와 퍼블 HTML/CSS를 분석하여 유스케이스 관점의 화면 명세를 생성한다"
        details:
          - thymeleaf-guide-index.md
          - hybrids-guide-index.md
        agent: usecase-analyst

    - page-synthesis:
        desc: "분석 결과를 통합하여 분석 내용 초고를 작성한다"
        input:
          - page-analyze-A
          - page-analyze-B
        agent: scope-reduction-reconciler

    - page-retrospect:
        desc: "분석 결과를 통합하여 분석 내용 회고를 작성한다"
        input:
          - page-synthesis
        agent: scope-reduction-reconciler

    - page-usecase-review:
        desc: "화면 명세의 유스케이스 완전성과 사후조건을 채점하고 개선 방향을 제시한다"
        input:
          - page-retrospect
        agent: usecase-evaluator
    - page-uiux-review:
        desc: "화면 명세의 UX 패턴과 인터랙션 완전성을 채점하고 개선 방향을 제시한다"
        input:
          - page-retrospect
        details:
          - thymeleaf-guide-index.md
          - hybrids-guide-index.md
        agent: uiux-evaluator

    - page-plan:
        desc: "화면 구현 계획을 수립한다 (컴포넌트 구조, 데이터 바인딩, 이벤트 흐름)"
        details:
          - thymeleaf-page-template.md
          - thymeleaf-ui-components.md
          - thymeleaf-data-passing.md
          - js-module-structure.md
          - hybrids-component-structure.md
          - hybrids-store-state.md
          - hybrids-ui-patterns.md
          - hybrids-page-entry.md
        input:
          - page-retrospect
        agent: uiux-planner
    - page-plan-validate:
        desc: "화면 구현 계획의 패턴 준수와 완전성을 검증한다 (합격/불합격)"
        details:
          - thymeleaf-page-template.md
          - thymeleaf-ui-components.md
          - thymeleaf-data-passing.md
          - js-module-structure.md
          - hybrids-component-structure.md
          - hybrids-store-state.md
          - hybrids-ui-patterns.md
          - hybrids-page-entry.md
        input:
          - page-plan
        agent: uiux-validator
    - page-plan-review:
        desc: "검증 통과된 구현 계획의 품질을 채점하고 개선 방향을 제시한다"
        input:
          - page-plan
        agent: uiux-evaluator

    - page-implements:
        desc: "화면 명세를 기반으로 Thymeleaf 템플릿과 JS 파일을 생성한다"
        details:
          - thymeleaf-page-template.md
          - thymeleaf-ui-components.md
          - thymeleaf-data-passing.md
          - js-module-structure.md
          - hybrids-component-structure.md
          - hybrids-store-state.md
          - hybrids-ui-patterns.md
          - hybrids-page-entry.md
        input:
          - page-plan
        agent: uiux-implementor

    - page-validate:
        desc: "생성된 화면 코드의 패턴 준수, 데이터 바인딩 정확성, 누락 여부를 검증한다 (합격/불합격)"
        details:
          - thymeleaf-page-template.md
          - thymeleaf-ui-components.md
          - thymeleaf-data-passing.md
          - js-module-structure.md
          - hybrids-component-structure.md
          - hybrids-store-state.md
          - hybrids-ui-patterns.md
          - hybrids-page-entry.md
        agent: uiux-validator
        input:
          - page-plan
          - page-implements
    - page-review:
        desc: "검증 통과된 화면 코드의 설계 품질을 채점하고 개선 방향을 제시한다"
        details:
          - thymeleaf-page-template.md
          - thymeleaf-ui-components.md
          - thymeleaf-data-passing.md
          - js-module-structure.md
          - hybrids-component-structure.md
          - hybrids-store-state.md
          - hybrids-ui-patterns.md
          - hybrids-page-entry.md
        input:
          - page-implements
        agent: uiux-evaluator

flow:
  # Phase 1: 분석
  - parallel:
    - page-analyze-A
    - page-analyze-B
  - page-synthesis
  - retry:
      condition: score < 80
      max: 2
      flow:
        - page-retrospect
        - parallel:
          - page-usecase-review
          - page-uiux-review
  - hitl
  # Phase 2: 계획
  - retry:
      condition: validate fail
      max: 2
      flow:
        - page-plan
        - page-plan-validate
  - hitl
  # Phase 3: 구현
  - retry:
      condition: validate fail || score < 80
      max: 2
      flow:
        - page-implements
        - parallel:
          - page-validate
          - page-review
  - hitl
