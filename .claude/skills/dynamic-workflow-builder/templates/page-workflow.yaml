define:
  steps:
    - page-analyze-A:
        desc: "Controller와 퍼블 HTML/CSS를 분석하여 UI/UX 관점의 화면 명세를 생성한다"
        refs:
          - thymeleaf-guide-index.md
          - hybrids-guide-index.md
        agent: uiux-analyst
    - page-analyze-B:
        desc: "Controller와 퍼블 HTML/CSS를 분석하여 유스케이스 관점의 화면 명세를 생성한다"
        refs:
          - thymeleaf-guide-index.md
          - hybrids-guide-index.md
        agent: usecase-analyst

    - page-tradeoff-advise:
        desc: "화면 구현 방식의 트레이드오프를 조언한다"
        input:
          - page-analyze-A
          - page-analyze-B
        agent: tradeoff-advisor
    - page-constraint-advise:
        desc: "화면 구현 제약 요인과 우회 방안을 조언한다"
        input:
          - page-analyze-A
          - page-analyze-B
        agent: constraint-bypass-advisor
    - page-scope-reduction-advise:
        desc: "최소 범위로 화면 요구사항을 충족하는 방안을 조언한다"
        input:
          - page-analyze-A
          - page-analyze-B
        agent: scope-reduction-advisor

    - page-synthesis:
        desc: "분석 및 조언 결과를 통합하여 화면 구현 방향을 결정한다"
        input:
          - page-analyze-A
          - page-analyze-B
          - page-tradeoff-advise
          - page-constraint-advise
          - page-scope-reduction-advise
        agent: scope-reduction-reconciler

    - page-usecase-review:
        desc: "화면 명세의 유스케이스 완전성과 사후조건을 검증하고 점수를 매긴다"
        input:
          - page-synthesis
        agent: usecase-critic
    - page-uiux-review:
        desc: "화면 명세의 UX 패턴과 인터랙션 완전성을 검증하고 점수를 매긴다"
        input:
          - page-synthesis
        refs:
          - thymeleaf-guide-index.md
          - hybrids-guide-index.md
        agent: uiux-critic

    - page-implements:
        desc: "화면 명세를 기반으로 Thymeleaf 템플릿과 JS 파일을 생성한다"
        refs:
          - thymeleaf-page-template.md
          - thymeleaf-ui-components.md
          - thymeleaf-data-passing.md
          - js-module-structure.md
          - hybrids-component-structure.md
          - hybrids-store-state.md
          - hybrids-ui-patterns.md
          - hybrids-page-entry.md
        input:
          - page-usecase-review
          - page-uiux-review
        agent: uiux-implementor

    - page-review:
        desc: "생성된 화면 코드의 패턴 준수, 데이터 바인딩 정확성, 누락 여부를 점검하고 점수를 매긴다"
        refs:
          - thymeleaf-page-template.md
          - thymeleaf-ui-components.md
          - thymeleaf-data-passing.md
          - js-module-structure.md
          - hybrids-component-structure.md
          - hybrids-store-state.md
          - hybrids-ui-patterns.md
          - hybrids-page-entry.md
        agent: uiux-critic

flow:
  - retry:
      condition: score < 80
      max: 3
      flow:
        - parallel:
          - page-analyze-A
          - page-analyze-B
        - parallel:
          - page-tradeoff-advise
          - page-constraint-advise
          - page-scope-reduction-advise
        - page-synthesis
        - page-usecase-review
        - if:
            condition: score >= 80
            flow: page-uiux-review
  - hitl
  - retry:
      condition: score < 80
      max: 2
      flow:
        - page-implements
        - page-review
  - hitl
