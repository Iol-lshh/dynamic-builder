define:
  steps:
    - tdd-tradeoff-advise:
        desc: "구현 방식의 트레이드오프를 조언한다"
        agent: tradeoff-advisor
    - tdd-constraint-advise:
        desc: "구현 제약 요인과 우회 방안을 조언한다"
        agent: constraint-bypass-advisor
    - tdd-scope-reduction-advise:
        desc: "최소 범위로 구현 목표를 달성하는 방안을 조언한다"
        agent: scope-reduction-advisor

    - tdd-synthesis:
        desc: "조언 결과를 통합하여 TDD 구현 방향을 결정한다"
        input:
          - tdd-tradeoff-advise
          - tdd-constraint-advise
          - tdd-scope-reduction-advise
        agent: scope-reduction-reconciler

    - tdd-test:
        desc: "spec-plan 명세를 기반으로 실패하는 테스트를 우선 작성한다 (TDD Red)"
        input:
          - tdd-synthesis
        agent: test-implementor

    - tdd-implement:
        desc: "실패하는 테스트를 통과시키는 최소한의 구현을 작성한다 (TDD Green)"
        input:
          - tdd-test
        agent: code-level-implementor

    - quality-review:
        desc: "구현된 코드의 품질을 분석하고 위반 항목을 우선순위와 함께 식별하며 채점한다"
        agent: code-level-critic

flow:
  - parallel:
    - tdd-tradeoff-advise
    - tdd-constraint-advise
    - tdd-scope-reduction-advise
  - tdd-synthesis
  - hitl
  - retry:
      condition: score < 80
      max: 3
      flow:
        - tdd-test
        - tdd-implement
        - quality-review
  - hitl
