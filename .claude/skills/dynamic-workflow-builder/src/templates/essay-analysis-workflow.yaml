define:
  steps:
    # ── 낙관도 (Optimism) ──
    - essay-opt-emp:
        desc: "텍스트의 낙관도를 경험주의 관점에서 측정한다. 글에 나타난 관찰 가능한 사실과 사례를 근거로, 주제에 대해 얼마나 긍정적/낙관적 또는 비관적/회의적 톤인지 점수화한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        agent: empiricist-analyst
    - essay-opt-apr:
        desc: "텍스트의 낙관도를 선험주의 관점에서 측정한다. 저자가 전제하는 원리와 연역 구조를 통해, 주제에 대한 낙관/비관의 정도를 점수화한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        agent: apriorist-analyst
    - essay-opt-dct:
        desc: "텍스트의 낙관도를 해체주의 관점에서 측정한다. 낙관/비관 표현 이면의 숨겨진 전제와 억압된 톤을 드러내어 실제 낙관 정도를 점수화한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        agent: deconstructionist-analyst
    - essay-opt-reconcile:
        desc: "낙관도에 대한 3개 관점(경험주의·선험주의·해체주의)의 측정 결과를 통합하여 통합 스코어와 근거를 산출한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        input:
          - essay-opt-emp
          - essay-opt-apr
          - essay-opt-dct
        agent: essay-synthesis-reconciler

    # ── 해체도 (Deconstruction Level) ──
    - essay-dec-emp:
        desc: "텍스트의 해체도를 경험주의 관점에서 측정한다. 저자가 기존 구조를 수용하는지 해체하는지, 그 정도를 관찰 가능한 사례로부터 점수화한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        agent: empiricist-analyst
    - essay-dec-apr:
        desc: "텍스트의 해체도를 선험주의 관점에서 측정한다. 저자가 기존 공리를 수용하는 정도와 의문시하는 정도를 연역적으로 점수화한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        agent: apriorist-analyst
    - essay-dec-dct:
        desc: "텍스트의 해체도를 해체주의 관점에서 측정한다. 기존 이항 대립을 얼마나 해체하는지, 자기 모순적 지점이 어느 정도인지 점수화한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        agent: deconstructionist-analyst
    - essay-dec-reconcile:
        desc: "해체도에 대한 3개 관점의 측정 결과를 통합하여 통합 스코어와 근거를 산출한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        input:
          - essay-dec-emp
          - essay-dec-apr
          - essay-dec-dct
        agent: essay-synthesis-reconciler

    # ── 문제 인식 (Problem Awareness) ──
    - essay-prb-emp:
        desc: "텍스트의 문제 인식 수준을 경험주의 관점에서 측정한다. 저자가 경험적 증거와 관찰로부터 문제의 구조적 원인을 얼마나 포착하는지 점수화한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        agent: empiricist-analyst
    - essay-prb-apr:
        desc: "텍스트의 문제 인식 수준을 선험주의 관점에서 측정한다. 문제 정의의 범주적 전제와 논리적 구조가 얼마나 깊은지 점수화한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        agent: apriorist-analyst
    - essay-prb-dct:
        desc: "텍스트의 문제 인식 수준을 해체주의 관점에서 측정한다. 문제 정의가 배제하는 시각과 드러나지 않은 층위를 얼마나 인식하는지 점수화한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        agent: deconstructionist-analyst
    - essay-prb-reconcile:
        desc: "문제 인식에 대한 3개 관점의 측정 결과를 통합하여 통합 스코어와 근거를 산출한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        input:
          - essay-prb-emp
          - essay-prb-apr
          - essay-prb-dct
        agent: essay-synthesis-reconciler

    # ── 대안 해상도 (Alternative Resolution) ──
    - essay-alt-emp:
        desc: "텍스트의 대안 해상도를 경험주의 관점에서 측정한다. 제시된 대안이 얼마나 구체적이고 실현 가능한 수준인지 사례를 근거로 점수화한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        agent: empiricist-analyst
    - essay-alt-apr:
        desc: "텍스트의 대안 해상도를 선험주의 관점에서 측정한다. 대안이 전제하는 원리의 보편성과 논리적 정합성 수준을 점수화한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        agent: apriorist-analyst
    - essay-alt-dct:
        desc: "텍스트의 대안 해상도를 해체주의 관점에서 측정한다. 대안이 기존 구조를 얼마나 넘어서는지, 혹은 재생산하는지 그 정도를 점수화한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        agent: deconstructionist-analyst
    - essay-alt-reconcile:
        desc: "대안 해상도에 대한 3개 관점의 측정 결과를 통합하여 통합 스코어와 근거를 산출한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        input:
          - essay-alt-emp
          - essay-alt-apr
          - essay-alt-dct
        agent: essay-synthesis-reconciler

    # ── 내용 응집도 (Content Cohesion) ──
    - essay-coh-emp:
        desc: "텍스트의 내용 응집도를 경험주의 관점에서 측정한다. 접속사, 인과관계, 예시 연결 등 관찰 가능한 지표로부터 응집 정도를 점수화한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        agent: empiricist-analyst
    - essay-coh-apr:
        desc: "텍스트의 내용 응집도를 선험주의 관점에서 측정한다. 전체 논증의 연역적 구조와 전제-결론 일관성의 정도를 점수화한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        agent: apriorist-analyst
    - essay-coh-dct:
        desc: "텍스트의 내용 응집도를 해체주의 관점에서 측정한다. 표면적 응집 이면에 숨은 의미의 균열과 불연속의 정도를 점수화한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        agent: deconstructionist-analyst
    - essay-coh-reconcile:
        desc: "내용 응집도에 대한 3개 관점의 측정 결과를 통합하여 통합 스코어와 근거를 산출한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        input:
          - essay-coh-emp
          - essay-coh-apr
          - essay-coh-dct
        agent: essay-synthesis-reconciler

    # ── 관점 차별도 (Perspective Differentiation) ──
    - essay-dif-emp:
        desc: "텍스트의 관점 차별도를 경험주의 관점에서 측정한다. 저자의 주장이 기존 담론과 얼마나 차별화되는지 사례 비교를 통해 점수화한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        agent: empiricist-analyst
    - essay-dif-apr:
        desc: "텍스트의 관점 차별도를 선험주의 관점에서 측정한다. 저자가 사용하는 범주적 프레임이 기존 사고 체계와 얼마나 다른지 점수화한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        agent: apriorist-analyst
    - essay-dif-dct:
        desc: "텍스트의 관점 차별도를 해체주의 관점에서 측정한다. 저자가 클리셰를 재생산하는지, 기존 의미 체계를 전복하는지 그 정도를 점수화한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        agent: deconstructionist-analyst
    - essay-dif-reconcile:
        desc: "관점 차별도에 대한 3개 관점의 측정 결과를 통합하여 통합 스코어와 근거를 산출한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        input:
          - essay-dif-emp
          - essay-dif-apr
          - essay-dif-dct
        agent: essay-synthesis-reconciler

    # ── 최종 통합 ──
    - essay-synthesis:
        desc: "6개 척도의 측정 결과를 종합하여 최종 보고서를 작성한다. 총점과 척도별 점수, 종합 소견을 포함한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        input:
          - essay-opt-reconcile
          - essay-dec-reconcile
          - essay-prb-reconcile
          - essay-alt-reconcile
          - essay-coh-reconcile
          - essay-dif-reconcile
        agent: essay-synthesis-reconciler

    - essay-review:
        desc: "최종 보고서의 측정 품질을 채점한다. 각 척도별 스코어의 근거 충분성, 관점 간 통합의 일관성, 보고서의 완전성을 확인한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        input:
          - essay-synthesis
        agent: essay-synthesis-evaluator

flow:
  - retry:
      condition: score < 80
      max: 3
      flow:
        - parallel:
          - flow:
            - parallel:
              - essay-opt-emp
              - essay-opt-apr
              - essay-opt-dct
            - essay-opt-reconcile
          - flow:
            - parallel:
              - essay-dec-emp
              - essay-dec-apr
              - essay-dec-dct
            - essay-dec-reconcile
          - flow:
            - parallel:
              - essay-prb-emp
              - essay-prb-apr
              - essay-prb-dct
            - essay-prb-reconcile
          - flow:
            - parallel:
              - essay-alt-emp
              - essay-alt-apr
              - essay-alt-dct
            - essay-alt-reconcile
          - flow:
            - parallel:
              - essay-coh-emp
              - essay-coh-apr
              - essay-coh-dct
            - essay-coh-reconcile
          - flow:
            - parallel:
              - essay-dif-emp
              - essay-dif-apr
              - essay-dif-dct
            - essay-dif-reconcile
        - essay-synthesis
        - essay-review
  - hitl
