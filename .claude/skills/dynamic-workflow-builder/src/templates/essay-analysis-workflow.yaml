define:
  steps:
    # ── 낙관도 (Optimism) ──
    - essay-opt-emp:
        desc: "텍스트의 낙관도를 경험주의 관점에서 분석한다. 관찰 가능한 사실과 귀납적 근거를 기반으로 긍정/부정 전망의 근거 타당성을 평가한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        agent: empiricist-analyst
    - essay-opt-apr:
        desc: "텍스트의 낙관도를 선험주의 관점에서 분석한다. 저자가 전제하는 보편 원리와 연역 구조를 통해 낙관/비관의 논리적 필연성을 평가한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        agent: apriorist-analyst
    - essay-opt-dct:
        desc: "텍스트의 낙관도를 해체주의 관점에서 분석한다. 낙관/비관의 이항 대립 구조와 숨겨진 위계를 해체하여 억압된 의미를 드러낸다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        agent: deconstructionist-analyst
    - essay-opt-reconcile:
        desc: "낙관도에 대한 3개 관점(경험주의·선험주의·해체주의)의 분석 결과를 통합하여 통합 스코어와 근거를 산출한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        input:
          - essay-opt-emp
          - essay-opt-apr
          - essay-opt-dct
        agent: essay-synthesis-reconciler

    # ── 해체도 (Deconstruction Level) ──
    - essay-dec-emp:
        desc: "텍스트의 해체도를 경험주의 관점에서 분석한다. 저자가 기존 구조를 수용/해체하는 구체적 사례와 근거를 귀납적으로 평가한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        agent: empiricist-analyst
    - essay-dec-apr:
        desc: "텍스트의 해체도를 선험주의 관점에서 분석한다. 저자가 의존하는 선험적 공리와 그것을 의문시하는 정도를 연역적으로 평가한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        agent: apriorist-analyst
    - essay-dec-dct:
        desc: "텍스트의 해체도를 해체주의 관점에서 분석한다. 선험/해체의 이항 대립 자체를 해체하고 텍스트의 자기 모순적 지점을 식별한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        agent: deconstructionist-analyst
    - essay-dec-reconcile:
        desc: "해체도에 대한 3개 관점의 분석 결과를 통합하여 통합 스코어와 근거를 산출한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        input:
          - essay-dec-emp
          - essay-dec-apr
          - essay-dec-dct
        agent: essay-synthesis-reconciler

    # ── 문제 인식 (Problem Awareness) ──
    - essay-prb-emp:
        desc: "텍스트의 문제 인식 수준을 경험주의 관점에서 분석한다. 저자가 제시하는 경험적 증거와 관찰이 문제의 구조적 원인을 포착하는 정도를 평가한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        agent: empiricist-analyst
    - essay-prb-apr:
        desc: "텍스트의 문제 인식 수준을 선험주의 관점에서 분석한다. 문제 정의에 내재된 범주적 전제와 논리적 구조의 완전성을 평가한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        agent: apriorist-analyst
    - essay-prb-dct:
        desc: "텍스트의 문제 인식 수준을 해체주의 관점에서 분석한다. 문제 정의 자체가 배제하는 시각과 억압하는 주체를 식별한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        agent: deconstructionist-analyst
    - essay-prb-reconcile:
        desc: "문제 인식에 대한 3개 관점의 분석 결과를 통합하여 통합 스코어와 근거를 산출한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        input:
          - essay-prb-emp
          - essay-prb-apr
          - essay-prb-dct
        agent: essay-synthesis-reconciler

    # ── 대안 해상도 (Alternative Resolution) ──
    - essay-alt-emp:
        desc: "텍스트의 대안 해상도를 경험주의 관점에서 분석한다. 제시된 대안의 경험적 실현 가능성과 사례 기반 근거를 평가한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        agent: empiricist-analyst
    - essay-alt-apr:
        desc: "텍스트의 대안 해상도를 선험주의 관점에서 분석한다. 대안이 전제하는 원리의 보편성과 논리적 정합성을 평가한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        agent: apriorist-analyst
    - essay-alt-dct:
        desc: "텍스트의 대안 해상도를 해체주의 관점에서 분석한다. 대안이 재생산하는 기존 위계와 배제의 구조를 식별한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        agent: deconstructionist-analyst
    - essay-alt-reconcile:
        desc: "대안 해상도에 대한 3개 관점의 분석 결과를 통합하여 통합 스코어와 근거를 산출한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        input:
          - essay-alt-emp
          - essay-alt-apr
          - essay-alt-dct
        agent: essay-synthesis-reconciler

    # ── 내용 응집도 (Content Cohesion) ──
    - essay-coh-emp:
        desc: "텍스트의 내용 응집도를 경험주의 관점에서 분석한다. 논리적 연결의 관찰 가능한 지표(접속사, 인과관계, 예시 연결)를 귀납적으로 평가한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        agent: empiricist-analyst
    - essay-coh-apr:
        desc: "텍스트의 내용 응집도를 선험주의 관점에서 분석한다. 전체 논증의 연역적 구조와 전제-결론의 일관성을 평가한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        agent: apriorist-analyst
    - essay-coh-dct:
        desc: "텍스트의 내용 응집도를 해체주의 관점에서 분석한다. 표면적 응집 뒤에 숨은 의미의 균열과 불연속을 식별한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        agent: deconstructionist-analyst
    - essay-coh-reconcile:
        desc: "내용 응집도에 대한 3개 관점의 분석 결과를 통합하여 통합 스코어와 근거를 산출한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        input:
          - essay-coh-emp
          - essay-coh-apr
          - essay-coh-dct
        agent: essay-synthesis-reconciler

    # ── 관점 차별도 (Perspective Differentiation) ──
    - essay-dif-emp:
        desc: "텍스트의 관점 차별도를 경험주의 관점에서 분석한다. 저자의 주장이 기존 담론과 경험적으로 얼마나 차별화되는지 사례 비교를 통해 평가한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        agent: empiricist-analyst
    - essay-dif-apr:
        desc: "텍스트의 관점 차별도를 선험주의 관점에서 분석한다. 저자가 사용하는 범주적 프레임이 기존 사고 체계와 얼마나 다른지 평가한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        agent: apriorist-analyst
    - essay-dif-dct:
        desc: "텍스트의 관점 차별도를 해체주의 관점에서 분석한다. 저자가 클리셰를 재생산하는지, 아니면 기존 의미 체계를 전복하는지 분석한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        agent: deconstructionist-analyst
    - essay-dif-reconcile:
        desc: "관점 차별도에 대한 3개 관점의 분석 결과를 통합하여 통합 스코어와 근거를 산출한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        input:
          - essay-dif-emp
          - essay-dif-apr
          - essay-dif-dct
        agent: essay-synthesis-reconciler

    # ── 최종 통합 ──
    - essay-synthesis:
        desc: "6개 척도의 통합 분석 결과를 종합하여 최종 분석 보고서를 작성한다. 총점과 척도별 점수, 종합 소견을 포함한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        input:
          - essay-opt-reconcile
          - essay-dec-reconcile
          - essay-prb-reconcile
          - essay-alt-reconcile
          - essay-coh-reconcile
          - essay-dif-reconcile
        agent: essay-synthesis-reconciler

    - essay-review:
        desc: "최종 분석 보고서의 품질을 채점한다. 각 척도별 스코어의 근거 충분성, 관점 간 통합의 공정성, 보고서의 완전성을 평가한다"
        details:
          - scoring-scales.md
          - essay-output-format.md
        input:
          - essay-synthesis
        agent: essay-synthesis-evaluator

flow:
  - retry:
      condition: score < 80
      max: 3
      flow:
        - parallel:
          - flow:
            - parallel:
              - essay-opt-emp
              - essay-opt-apr
              - essay-opt-dct
            - essay-opt-reconcile
          - flow:
            - parallel:
              - essay-dec-emp
              - essay-dec-apr
              - essay-dec-dct
            - essay-dec-reconcile
          - flow:
            - parallel:
              - essay-prb-emp
              - essay-prb-apr
              - essay-prb-dct
            - essay-prb-reconcile
          - flow:
            - parallel:
              - essay-alt-emp
              - essay-alt-apr
              - essay-alt-dct
            - essay-alt-reconcile
          - flow:
            - parallel:
              - essay-coh-emp
              - essay-coh-apr
              - essay-coh-dct
            - essay-coh-reconcile
          - flow:
            - parallel:
              - essay-dif-emp
              - essay-dif-apr
              - essay-dif-dct
            - essay-dif-reconcile
        - essay-synthesis
        - essay-review
  - hitl
