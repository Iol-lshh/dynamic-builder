define:
  steps:
    - coverage-analyze-A:
        desc: "컨디션 커버리지 누락 분기를 유스케이스 관점에서 식별한다"
        details:
          - condition-coverage-guide.md
        agent: usecase-analyst
    - coverage-analyze-B:
        desc: "컨디션 커버리지 누락 분기를 코드 레벨 관점에서 식별한다"
        details:
          - condition-coverage-guide.md
        agent: code-level-analyst

    - coverage-tradeoff-advise:
        desc: "커버리지 분석 결과를 바탕으로 테스트 전략의 트레이드오프를 조언한다"
        input:
          - coverage-analyze-A
          - coverage-analyze-B
        agent: tradeoff-advisor
    - coverage-constraint-advise:
        desc: "커버리지 달성의 제약 요인과 우회 방안을 조언한다"
        input:
          - coverage-analyze-A
          - coverage-analyze-B
        agent: constraint-bypass-advisor
    - coverage-scope-reduction-advise:
        desc: "최소 범위로 커버리지 목표를 달성하는 방안을 조언한다"
        input:
          - coverage-analyze-A
          - coverage-analyze-B
        agent: scope-reduction-advisor

    - coverage-synthesis:
        desc: "분석 및 조언 결과를 통합하여 커버리지 테스트 계획 방향을 결정한다"
        input:
          - coverage-analyze-A
          - coverage-analyze-B
          - coverage-tradeoff-advise
          - coverage-constraint-advise
          - coverage-scope-reduction-advise
        agent: scope-reduction-reconciler

    - coverage-plan:
        desc: "커버리지 테스트 작성 계획을 수립한다"
        input:
          - coverage-synthesis
        agent: test-analyst

    - coverage-plan-review:
        desc: "커버리지 테스트 계획의 완전성과 정확성을 검증하고 점수를 매긴다"
        input:
          - coverage-plan
        agent: usecase-critic

    - coverage-test:
        desc: "컨디션 커버리지 테스트를 작성한다"
        details:
          - condition-coverage-guide.md
        input:
          - coverage-plan
        agent: test-implementor

    - coverage-review:
        desc: "커버리지 달성 여부를 JaCoCo 기반으로 확인하고 점수를 매긴다"
        details:
          - condition-coverage-guide.md
        agent: code-level-critic

flow:
  - retry:
      condition: score < 80
      max: 3
      flow:
        - parallel:
          - coverage-analyze-A
          - coverage-analyze-B
        - parallel:
          - coverage-tradeoff-advise
          - coverage-constraint-advise
          - coverage-scope-reduction-advise
        - coverage-synthesis
        - coverage-plan
        - coverage-plan-review
  - hitl
  - retry:
      condition: score < 80
      max: 2
      flow:
        - coverage-test
        - coverage-review
  - hitl
