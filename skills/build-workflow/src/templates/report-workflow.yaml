define:
  steps:
    # ── Phase 1: 질문 도출 ──
    - report-question-lifecycle:
        desc: "입력 데이터를 task-lifecycle 관점에서 분석하여, 사용자에게 확인해야 할 질문을 도출한다"
        details:
          - question-generation-guide.md
        agent: task-lifecycle-analyst

    - report-question-usecase:
        desc: "입력 데이터를 usecase-design 관점에서 분석하여, 사용자에게 확인해야 할 질문을 도출한다"
        details:
          - question-generation-guide.md
        agent: usecase-analyst

    - report-question-tradeoff:
        desc: "입력 데이터를 technical-tradeoff 관점에서 분석하여, 사용자에게 확인해야 할 질문을 도출한다"
        details:
          - question-generation-guide.md
        agent: tradeoff-analyst

    - report-question-synthesis:
        desc: "3개 관점의 질문을 통합하고, 중복 제거, 우선순위 부여"
        input:
          - report-question-lifecycle
          - report-question-usecase
          - report-question-tradeoff
        agent: workflow-design-reconciler

    # ── Phase 2: 리포트 생성 ──
    # 2-1. 답변 분석
    - report-answer-analysis:
        desc: "사용자 답변을 Phase 1 분석 결과와 교차 분석하여 ASIS/TOBE 요소 추출, 답변-질문 정합성 검증"
        details:
          - answer-analysis-guide.md
        input:
          - report-question-lifecycle
          - report-question-usecase
          - report-question-tradeoff
          - report-question-synthesis
        agent: workflow-design-reconciler

    # 2-2. 리포트 생성
    - report-draft:
        desc: "ASIS/TOBE → 왜/무엇을/어떻게 구조의 리포트 초안 작성. 간략/요약 + expandable 구조"
        details:
          - report-output-format.md
        input:
          - report-answer-analysis
        agent: workflow-design-reconciler

    # 2-3. 리포트 검증
    - report-validate:
        desc: "리포트 구조 규칙 준수 검증: ASIS/TOBE 존재, 왜/무엇을/어떻게 완전성, 간략+확장 구조. 합격/불합격"
        details:
          - report-validation-rules.md
        input:
          - report-draft
        agent: workflow-design-validator

    # 2-4. 리포트 평가
    - report-review:
        desc: "리포트 품질 채점: ASIS/TOBE 동기 명확성, 완전성, 답변 활용도, 간결성, 확장 구조"
        details:
          - report-scoring-criteria.md
        input:
          - report-draft
          - report-validate
        agent: workflow-design-evaluator

flow:
  # Phase 1: 질문 도출
  - parallel:
    - report-question-lifecycle
    - report-question-usecase
    - report-question-tradeoff
  - report-question-synthesis
  - hitl
  # Phase 2: 리포트 생성 (분석 → 생성 → 검증 → 평가)
  - retry:
      condition: score < 80
      max: 3
      flow:
        - report-answer-analysis
        - report-draft
        - report-validate
        - report-review
  - hitl
