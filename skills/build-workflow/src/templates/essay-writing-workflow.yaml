define:
  steps:
    # ── Phase 1: 질문 도출 ──

    # 축 A: 내용/논증 분석
    - ew-content-analyze:
        desc: "입력 텍스트의 내용/논증 구조를 분석하여, 근거 타당성·논리 구조·편향에 대해 확인해야 할 질문을 도출한다"
        details:
          - question-generation-guide.md
        agent: essay-writing-analyst

    - ew-analyze-evidence:
        desc: "경험주의 관점에서 텍스트의 근거 타당성을 분석한다. 관찰 가능한 사실과 귀납적 근거의 충분성을 평가하고 질문을 도출한다"
        details:
          - question-generation-guide.md
        input:
          - ew-content-analyze
        agent: empiricist-analyst

    - ew-analyze-logic:
        desc: "선험주의 관점에서 텍스트의 논리 구조를 분석한다. 전제-결론의 연역적 타당성과 범주적 일관성을 평가하고 질문을 도출한다"
        details:
          - question-generation-guide.md
        input:
          - ew-content-analyze
        agent: apriorist-analyst

    - ew-analyze-bias:
        desc: "해체주의 관점에서 텍스트의 편향을 분석한다. 이항 대립 구조, 숨겨진 위계, 배제된 시각을 식별하고 질문을 도출한다"
        details:
          - question-generation-guide.md
        input:
          - ew-content-analyze
        agent: deconstructionist-analyst

    # 축 B: 형식/독자 분석
    - ew-form-analyze:
        desc: "입력 텍스트의 형식/독자/매체 측면을 분석하여, 독자 적합성·톤·구조에 대해 확인해야 할 질문을 도출한다"
        details:
          - question-generation-guide.md
        agent: essay-writing-analyst

    # 통합
    - ew-synthesize:
        desc: "축 A(내용/논증)와 축 B(형식/독자)의 분석 결과를 통합하고, 중복 제거, 우선순위 부여하여 사용자에게 제시할 질문 목록을 작성한다"
        input:
          - ew-content-analyze
          - ew-analyze-evidence
          - ew-analyze-logic
          - ew-analyze-bias
          - ew-form-analyze
        agent: essay-writing-reconciler

    # ── Phase 2: 산출물 생성 ──

    # 2-1. 답변 분석
    - ew-answer-analysis:
        desc: "사용자 답변을 Phase 1 분석 결과와 교차 분석하여, 논픽션 글 작성에 필요한 요소를 추출한다. 주제·논지·근거·독자·톤·구조·매체 요소를 정리한다"
        details:
          - answer-analysis-guide.md
        input:
          - ew-synthesize
        agent: essay-writing-reconciler

    # 2-2. 초안 작성
    - ew-draft:
        desc: "답변 분석 결과를 바탕으로 논픽션 글 초안을 작성한다. 독자·톤·구조·논증 요소를 모두 반영한다"
        details:
          - ew-output-format.md
        input:
          - ew-answer-analysis
        agent: essay-writing-builder

    # 2-3. 3관점 병렬 분석
    - ew-draft-analyze-emp:
        desc: "경험주의 관점에서 초안을 검토한다. 주장의 경험적 근거가 충분한지, 사례와 데이터가 구체적인지, 귀납 추론에 비약이 없는지 평가하고 개선 조언을 제시한다"
        input:
          - ew-draft
        agent: empiricist-analyst
    - ew-draft-analyze-apr:
        desc: "선험주의 관점에서 초안을 검토한다. 논증의 전제가 명시적인지, 연역 구조가 타당한지, 범주적 일관성이 유지되는지 평가하고 개선 조언을 제시한다"
        input:
          - ew-draft
        agent: apriorist-analyst
    - ew-draft-analyze-dct:
        desc: "해체주의 관점에서 초안을 검토한다. 숨겨진 편향, 이항 대립의 위계, 배제된 시각이 있는지 식별하고 개선 조언을 제시한다"
        input:
          - ew-draft
        agent: deconstructionist-analyst
    - ew-draft-synthesize:
        desc: "3관점 초안 검토 내용을 조율하여 하나의 문서를 작성한다."
        input:
          - ew-draft
          - ew-draft-analyze-emp
          - ew-draft-analyze-apr
          - ew-draft-analyze-dct
        agent: essay-writing-reconciler

    # 2-4. 회고 (분석을 반영한 수정본)
    - ew-retrospect:
        desc: "원고를 수정·개선한다"
        input:
          - ew-draft-synthesize
        agent: essay-writing-reconciler

    # 2-5. 평가
    - ew-review:
        desc: "논픽션 글의 품질을 5개 항목으로 채점한다. 논증 타당성, 독자 적합성, 구조 완성도, 문체 일관성, 근거 활용도를 평가한다"
        details:
          - ew-scoring-criteria.md
        input:
          - ew-retrospect
        agent: essay-writing-evaluator

flow:
  # Phase 1: 질문 도출
  - parallel:
    - flow:
      - ew-content-analyze
      - parallel:
        - ew-analyze-evidence
        - ew-analyze-logic
        - ew-analyze-bias
    - ew-form-analyze
  - ew-synthesize
  - hitl
  # Phase 2: 산출물 생성
  - ew-answer-analysis
  - ew-draft
  - parallel:
    - ew-draft-analyze-emp
    - ew-draft-analyze-apr
    - ew-draft-analyze-dct
  - ew-draft-synthesize
  - retry:
      condition: score < 80
      max: 2
      flow:
        - ew-retrospect
        - ew-review
  - hitl
