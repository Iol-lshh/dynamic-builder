input:
  figma-url:
    desc: "Figma 화면 URL. FILE_KEY와 NODE_ID를 파싱한다"
    required: true
  force-refresh:
    desc: "true이면 캐시를 무시하고 Figma API를 재호출한다"
    default: false

define:
  steps:
    # ── Phase 1: 데이터 수집 및 다관점 분석 ──

    - fetch-figma:
        desc: "Figma URL에서 FILE_KEY/NODE_ID를 파싱하고, 캐시 확인 후 필요 시 API 호출. 응답을 전처리하여 분석 필수 노드만 추출한다"
        agent: orchestrator
        type: shell
        details:
          - figma-fetch-details.md
        output: figma-data.json

    - analyze-uiux:
        desc: "UI/UX 관점에서 화면 기획서를 분석한다 -- 인터랙션, 정보구조, 상태전이, 컴포넌트"
        agent: uiux-analyst
        details:
          - figma-uiux-analysis-details.md
        input:
          - fetch-figma
        output: analysis-uiux.md

    - analyze-business:
        desc: "비즈니스 로직 관점에서 화면 기획서를 분석한다 -- 도메인 모델, 비즈니스 규칙, 데이터 흐름"
        agent: domain-analyst
        details:
          - figma-business-analysis-details.md
        input:
          - fetch-figma
        output: analysis-business.md

    - merge-analyses:
        desc: "UI/UX 분석과 비즈니스 분석을 통합하여 단일 백로그 초안을 생성한다"
        agent: scope-reduction-reconciler
        details:
          - figma-merge-analyses-details.md
        input:
          - analyze-uiux
          - analyze-business
        output: backlog-draft.md

    # ── Phase 2: 스코프 어드바이스 + 백로그 확정 ──

    - apply-advice:
        desc: "통합 백로그에 대해 스코프 관점(CUT/MINIMUM/DEFER)으로 어드바이스하고 반영하여 최종 백로그를 생성한다 (+ retry 시 평가 피드백 반영)"
        agent: scope-reduction-reconciler
        details:
          - figma-apply-advice-details.md
        input:
          - merge-analyses
          - evaluate-backlog          # retry 시에만 존재. 초회에는 null 허용
        output: backlog-final.md

    - evaluate-backlog:
        desc: "최종 백로그의 품질을 평가한다 -- 완전성/명확성/실행가능성/범위적절성/우선순위근거 각 20점"
        agent: usecase-evaluator
        details:
          - figma-evaluate-backlog-details.md
        input:
          - apply-advice
        output: evaluation-backlog.md

    # ── Phase 3: 의존관계 및 중요도 분석 ──

    - analyze-dependencies:
        desc: "확정된 백로그 항목 간 의존관계를 파악한다 -- 선후행, 블로커, 공유 자원"
        agent: domain-analyst
        details:
          - figma-dependency-analysis-details.md
        input:
          - apply-advice
        output: dependencies.md

    - analyze-priority:
        desc: "확정된 백로그 항목별 중요도와 우선순위를 산정한다 -- 영향 범위, 빈도, 사용자 가치"
        agent: domain-analyst
        details:
          - figma-priority-analysis-details.md
        input:
          - apply-advice
        output: priority.md

    - merge-dep-priority:
        desc: "의존관계 분석과 중요도 분석을 통합하여 우선순위가 반영된 최종 백로그를 생성한다"
        agent: scope-reduction-reconciler
        details:
          - figma-merge-dep-priority-details.md
        input:
          - analyze-dependencies
          - analyze-priority
        output: backlog-prioritized.md

    - validate-completeness:
        desc: "모든 백로그 항목에 의존관계와 중요도가 빠짐없이 배정되었는지 검증한다"
        agent: usecase-validator
        details:
          - figma-validate-completeness-details.md
        input:
          - merge-dep-priority
          - apply-advice
        output: validation-completeness.md

flow:
  # ── Phase 1: 데이터 수집 및 다관점 분석 ──
  - fetch-figma
  - parallel:
    - analyze-uiux
    - analyze-business
  - merge-analyses

  # ── Phase 2: 스코프 어드바이스 + 백로그 확정 ──
  - retry:
      condition: score < 80
      max: 2
      flow:
        - apply-advice
        - evaluate-backlog
  - hitl

  # ── Phase 3: 의존관계 및 중요도 분석 ──
  - parallel:
    - analyze-dependencies
    - analyze-priority
  - retry:
      condition: score < 80
      max: 2
      on_exhausted: hitl
      flow:
        - merge-dep-priority
        - validate-completeness
