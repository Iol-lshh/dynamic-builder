define:
  steps:
    - coverage-analyze-A:
        desc: "컨디션 커버리지 누락 분기를 유스케이스 관점에서 식별한다"
        details:
          - condition-coverage-guide.md
        agent: usecase-analyst
    - coverage-analyze-B:
        desc: "컨디션 커버리지 누락 분기를 코드 레벨 관점에서 식별한다"
        details:
          - condition-coverage-guide.md
        agent: code-level-analyst

    - coverage-synthesis:
        desc: "분석 결과를 통합하여 분석 내용 초고를 작성한다"
        input:
          - coverage-analyze-A
          - coverage-analyze-B
        agent: scope-reduction-reconciler

    - coverage-retrospect:
        desc: "분석 결과를 통합하여 분석 내용 회고를 작성한다"
        input:
          - coverage-synthesis
        agent: scope-reduction-reconciler

    - coverage-analyze-review:
        desc: "분석 결과 회고의 품질을 평가하고 개선 방향을 제시한다"
        input:
          - coverage-retrospect
        agent: code-level-evaluator

    - coverage-plan:
        desc: "커버리지 테스트 작성 계획을 수립한다"
        input:
          - coverage-retrospect
        agent: test-analyst

    - coverage-plan-validate:
        desc: "커버리지 테스트 계획의 완전성과 규칙 준수를 검증한다 (합격/불합격)"
        input:
          - coverage-retrospect
          - coverage-plan
        agent: usecase-validator

    - coverage-test:
        desc: "컨디션 커버리지 테스트를 작성한다"
        details:
          - condition-coverage-guide.md
        input:
          - coverage-plan
        agent: test-builder

    - coverage-validate:
        desc: "테스트 컴파일, 실행 통과, JaCoCo 커버리지 기준 충족을 검증한다 (합격/불합격)"
        details:
          - condition-coverage-guide.md
        input:
          - coverage-plan
          - coverage-test
        agent: code-level-validator
    - coverage-review:
        desc: "통과된 테스트의 품질을 채점하고 개선 방향을 제시한다"
        details:
          - condition-coverage-guide.md
        input:
          - coverage-plan
          - coverage-test
        agent: code-level-evaluator

flow:
  - parallel:
    - coverage-analyze-A
    - coverage-analyze-B
  - coverage-synthesis
  - retry:
      condition: score < 80
      max: 2
      flow:
        - coverage-retrospect
        - coverage-analyze-review
  - retry:
      condition: validate fail
      max: 2
      flow:
        - coverage-plan
        - coverage-plan-validate
  - hitl
  - retry:
      condition: validate fail || score < 80
      max: 2
      flow:
        - coverage-test
        - parallel:
          - coverage-validate
          - coverage-review
  - hitl
